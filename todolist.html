<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="todolist.css" />
</head>
<body>

  <div class="container">
    <h1>📝 To-Do List</h1>
    <p id="counter">0 tugas tersisa</p>

    <!-- Input tambah tugas -->
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Tambah tugas baru..." />
      <button onclick="addTask()">+ Tambah</button>
    </div>

    <!-- Tombol filter -->
    <div class="filter-area">
      <button class="active" id="btn-all" onclick="filterTasks('all')">Semua</button>
      <button id="btn-active" onclick="filterTasks('active')">Aktif</button>
      <button id="btn-done" onclick="filterTasks('done')">Selesai</button>
      <button class="btn-clear" onclick="clearDone()">🗑 Hapus selesai</button>
    </div>

    <!-- Daftar tugas -->
    <ul id="taskList"></ul>
    <p id="emptyMsg">Tidak ada tugas. Tambahkan sekarang! 🎉</p>
  </div>

  <script src="todolist.js"></script>

</body>
</html>
